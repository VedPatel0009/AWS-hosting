<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Page</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Full-Screen Container */
        .welcome-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Vibrant Gradient Background */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 20px;
        }

        /* Typography */
        .welcome-container h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            animation: fadeInDown 1s ease-out;
        }

        .welcome-container p {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            max-width: 600px;
            line-height: 1.6;
            opacity: 0.9;
            animation: fadeInUp 1s ease-out;
        }

        /* Call to Action Button */
        .cta-button {
            padding: 15px 35px;
            font-size: 1.1rem;
            color: #764ba2;
            background-color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 1s ease-out 0.3s;
            animation-fill-mode: backwards;
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            background-color: #f8f9fa;
        }

        /* Simple Load-in Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design for Mobile */
        @media (max-width: 600px) {
            .welcome-container h1 {
                font-size: 2.5rem;
            }
            .welcome-container p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Welcome to Our World</h1>
        <p>We are thrilled to have you here. Discover amazing features, connect with a great community, and start your journey with us today.</p>
        <a href="#get-started" class="cta-button">Get Started Now</a>
    </div>

</body>
</html>
