<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My One-Page Website</title>
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            scroll-behavior: smooth; /* Enables smooth scrolling between sections */
        }

        /* Navigation Bar */
        header {
            background-color: #2c3e50;
            color: #fff;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #3498db;
        }

        /* Page Sections */
        section {
            min-height: 100vh; /* Makes each section take up the full screen height */
            padding: 5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        h1, h2 {
            margin-bottom: 1rem;
        }

        p {
            max-width: 600px;
            font-size: 1.1rem;
        }

        /* Specific Section Backgrounds */
        #home {
            background-color: #ecf0f1;
        }

        #about {
            background-color: #fff;
        }

        #contact {
            background-color: #ecf0f1;
        }

        /* Footer */
        footer {
            background-color: #2c3e50;
            color: #fff;
            text-align: center;
            padding: 1.5rem;
        }
    </style>
